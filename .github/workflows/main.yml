name: Bot Deploy

on:
  push:
    branches: [ "diyorbek" ]

jobs:
  deploy:
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v3
      - name: Build
        run: docker build -t my-bot-image .
      - name: Deploy
        run: |
          docker stop bot-container || true
          docker rm bot-container || true
          docker run -d --name bot-container my-bot-image